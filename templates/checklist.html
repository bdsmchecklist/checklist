<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BDSM Checklist</title>
<link href="https://fonts.googleapis.com/css?family=Bowlby+One+SC" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Libre+Franklin" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="global.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>var num_rows = {{ num_rows }};</script>
<script src="logic.js"></script>
<!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lucaburgio/iconoir@main/css/iconoir.css">-->
</head>

<body>
  <h1 id="title">BDSM Checklist</h1>

  <div id="intro">
    <p>Rate each activity as a <strong>dom</strong> or a <strong>sub</strong>.</p>
    <p>Your answers will be available to share with a link at the bottom.</p>
  </div>

  <div id="received" class="notice" hidden>
    <p id="received_text">This is a shared checklist. Clear the answers for your role to fill in responses.</p>
    <button type="button" class="notice_close" id="received_close" aria-label="Dismiss">×</button>
  </div>

  <div id="checklist">
    <div id="checklist_head">
      <div class="head_col">
        <span class="header_name">Dom</span>
        <span id="dom_edit_buttons">
          <button id="clear_dom"><i class="iconoir-trash"></i><span class="tool_tip">Clear answers</span></button>
          <button id="edit_dom"><i class="iconoir-edit-pencil"></i><span class="tool_tip">Edit</span></button>
        </span>
      </div>
      <div class="head_spacer"></div>
      <div class="head_col">
        <span class="header_name">Sub</span>
        <span id="sub_edit_buttons">
          <button id="clear_sub"><i class="iconoir-trash"></i><span class="tool_tip">Clear answers</span></button>
          <button id="edit_sub"><i class="iconoir-edit-pencil"></i><span class="tool_tip">Edit</span></button>
        </span>
      </div>
    </div>

    <div id="checklist_body">
{{ checklist rows }}
    </div>
  </div>

  <div id="url_area">
    <p id="url_label">Copy this link to share your answers.</p>
    <input type="text" id="url_text" readonly></input>
    <button id="copy"><i class="iconoir-copy"></i><span class="tool_tip">Copy URL</span></button>
  </div>
</body>
</html>
